name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          AE735D: ${{ secrets.AE735D }}
          B2AB90: ${{ secrets.B2AB90 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AE735D', '')
          bm = os.environ.get('B2AB90', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 8d726a533a5ef7de3087013f3977b7bfcddc8ffa52 -->', gm)
              s2 = s2.replace('<!-- 27915e316f3bf87f33 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
